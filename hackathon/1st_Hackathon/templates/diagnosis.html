<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>투자 MBTI 결과 분석</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #191f28;
    }

    body {
      overflow-x: auto;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .wrapper {
      width: 1280px;
      min-height: 100vh;
      margin: 0 auto;
      background-color: #ffffff;
      position: relative;
    }

    .header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1280px;
      height: 84px;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 1000;
      border-bottom: 1px solid #f2f4f6;
    }

    .header img {
      width: 96px;
      display: block;
    }

    .layout {
      display: grid;
      grid-template-columns: 160px 1fr;
      min-height: 100vh;
      padding-top: 84px;
      background-color: #ffffff;
    }

    .sidebar {
      position: fixed;
      top: 84px;
      left: 50%;
      transform: translateX(-640px);
      width: 160px;
      height: calc(100vh - 84px);
      background-color: #ffffff;
      padding: 24px 0 24px 20px;
    }

    .sidebar ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sidebar a {
      font-size: 12px;
      color: #4e5968;
      line-height: 1.4;
      display: inline-block;
    }

    .sidebar .active a {
      color: #191f28;
      font-weight: 700;
    }

    .main {
      grid-column: 2;
      padding: 30px 24px 48px 24px;
      background-color: #ffffff;
    }

    .outer-panel {
      width: 100%;
      min-height: 700px;
      border: 1px solid #e5e8eb;
      background-color: #ffffff;
      padding: 30px;
    }

    .content-panel {
      width: 100%;
      min-height: 610px;
      background-color: #ffffff;
      border: 1px solid #f2f4f6;
      padding: 64px 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: center;
    }

    .left-content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .type-label {
      width: 100%;
      text-align: left;
      font-size: 14px;
      color: #6b7684;
      line-height: 1.5;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .type-title {
      width: 100%;
      text-align: left;
      font-size: 34px;
      font-weight: 700;
      color: #191f28;
      line-height: 1.2;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    .type-code {
      width: 100%;
      text-align: left;
      font-size: 16px;
      font-weight: 700;
      color: #d2a125;
      line-height: 1.3;
      margin-bottom: 18px;
    }

    .type-image {
      width: 150px;
      height: 150px;
      object-fit: contain;
      display: block;
    }

    .right-content {
      padding-top: 10px;
    }

    .analysis-title {
      font-size: 24px;
      font-weight: 700;
      color: #191f28;
      line-height: 1.3;
      margin-bottom: 18px;
      letter-spacing: -0.03em;
    }

    .analysis-list {
      padding-left: 20px;
      margin-bottom: 26px;
    }

    .analysis-list li {
      font-size: 15px;
      line-height: 1.85;
      color: #333d4b;
      margin-bottom: 2px;
      word-break: keep-all;
    }

    .move-button {
      min-width: 170px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background-color: #367ce8;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 0 18px;
    }

    .move-button:hover {
      background-color: #2f6fd6;
    }

    .fallback-text {
      text-align: center;
      font-size: 15px;
      color: #6b7684;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header class="header">
      <a href="/">
        <img src="/static/logo.png" alt="토스증권 로고" />
      </a>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <ul>
          <li><a href="/">홈</a></li>
          <li><a href="/investors">투자 주체별 매매 현황</a></li>
          <li><a href="/news">뉴스</a></li>
          <li><a href="/themes">종목 TOP 10</a></li>
          <li class="active"><a href="/mbti">투자 mbti 검사</a></li>
          <li><a href="/recommend">맞춤 상품 추천</a></li>
          <li><a href="/popular">인기 상품</a></li>
        </ul>
      </aside>

      <main class="main">
        <section class="outer-panel">
          <section class="content-panel" id="contentPanel">
            <div class="fallback-text">
              검사 결과를 불러오는 중입니다.
            </div>
          </section>
        </section>
      </main>
    </div>
  </div>

  <script src="/static/test.js"></script>
  <script>
    const fallbackTestData = {
      results: {
        SAFE: {
          title: "안정형 투자자",
          description: "안정적인 자산 관리와 리스크 최소화를 중요하게 생각하는 투자자입니다.",
          analysisPoints: [
            "원금 보전과 예측 가능한 흐름을 중요하게 생각합니다.",
            "급격한 변동보다 꾸준하고 안정적인 투자를 선호합니다.",
            "의사결정에서 손실 가능성을 먼저 고려하는 편입니다.",
            "장기적으로 마음 편한 투자 방식을 추구하는 경향이 있습니다."
          ]
        },
        ANALYSIS: {
          title: "분석형 투자자",
          description: "데이터와 근거를 바탕으로 논리적인 투자를 하는 스타일입니다.",
          analysisPoints: [
            "감보다 자료와 수치를 바탕으로 판단하려는 성향이 강합니다.",
            "기업 정보와 시장 데이터를 충분히 검토한 뒤 움직입니다.",
            "논리적으로 납득되는 투자에 더 큰 확신을 느낍니다.",
            "충분한 이해와 근거가 있어야 투자 결정을 내리는 편입니다."
          ]
        },
        TREND: {
          title: "트렌드형 투자자",
          description: "시장 흐름과 분위기를 빠르게 읽는 감각형 투자자입니다.",
          analysisPoints: [
            "시장 분위기와 화제가 되는 섹터의 흐름을 빠르게 포착합니다.",
            "현재 주목받는 분야에서 기회를 찾는 데 익숙한 편입니다.",
            "변화 속도가 빠른 시장에서도 유연하게 대응하려고 합니다.",
            "타이밍과 흐름이 투자 성과에 중요하다고 느끼는 경향이 있습니다."
          ]
        },
        RISK: {
          title: "고수익추구형 투자자",
          description: "높은 수익을 위해 리스크도 감수하는 공격적인 투자자입니다.",
          analysisPoints: [
            "높은 기대수익이 있다면 어느 정도 위험도 감수할 수 있습니다.",
            "기회가 왔을 때 빠르고 과감하게 움직이려는 성향이 있습니다.",
            "안정보다 성장성과 수익 가능성을 더 크게 보는 편입니다.",
            "변동성이 크더라도 큰 성과를 목표로 투자하려는 경향이 있습니다."
          ]
        }
      }
    };

    const TEST_SOURCE = window.TEST_DATA || fallbackTestData;
    const results = TEST_SOURCE.results;
    const contentPanel = document.getElementById("contentPanel");

    function getImageByType(type) {
      const imageMap = {
        SAFE: "/static/mbtiSafe.png",
        ANALYSIS: "/static/mbtiAnalysis.png",
        TREND: "/static/mbtiTrend.png",
        RISK: "/static/mbtiRisk.png"
      };

      return imageMap[type] || "/static/mbtiSafe.png";
    }

    function getCodeByType(type) {
      const codeMap = {
        SAFE: "ISFJ-A",
        ANALYSIS: "INTJ-A",
        TREND: "ENFP-A",
        RISK: "ISTP-A"
      };

      return codeMap[type] || "ISFJ-A";
    }

    function renderDiagnosis() {
      const savedType = localStorage.getItem("investmentMbtiType");

      if (!savedType || !results[savedType]) {
        contentPanel.innerHTML = `
          <div class="fallback-text">
            저장된 검사 결과가 없습니다.<br>
            먼저 투자 MBTI 검사를 진행해주세요.
          </div>
        `;
        return;
      }

      const resultData = results[savedType];
      const analysisPoints = resultData.analysisPoints || [];

      const listHtml = analysisPoints.map(function(point) {
        return `<li>${point}</li>`;
      }).join("");

      contentPanel.innerHTML = `
        <div class="content-grid">
          <div class="left-content">
            <p class="type-label">당신의 성격 유형은 :</p>
            <h2 class="type-title">${resultData.title}</h2>
            <p class="type-code">${getCodeByType(savedType)}</p>
            <img class="type-image" src="${getImageByType(savedType)}" alt="${resultData.title}">
          </div>

          <div class="right-content">
            <h3 class="analysis-title">분석 내용</h3>
            <ul class="analysis-list">
              ${listHtml}
            </ul>
            <button class="move-button" id="moveRecommendButton" type="button">
              맞춤형 투자 상품 둘러보기
            </button>
          </div>
        </div>
      `;

      const moveRecommendButton = document.getElementById("moveRecommendButton");
      moveRecommendButton.addEventListener("click", function() {
        window.location.href = "/recommend";
      });
    }

    renderDiagnosis();
  </script>
</body>
</html>
