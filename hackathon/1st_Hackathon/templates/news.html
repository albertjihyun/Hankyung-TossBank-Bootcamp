<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뉴스</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #191f28;
    }

    body {
      overflow-x: auto;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .wrapper {
      width: 1280px;
      min-height: 100vh;
      margin: 0 auto;
      background-color: #ffffff;
      position: relative;
    }

    .header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1280px;
      height: 84px;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 1000;
      border-bottom: 1px solid #f2f4f6;
    }

    .header-logo img {
      width: 96px;
      display: block;
    }

    .layout {
      display: grid;
      grid-template-columns: 160px 1fr;
      min-height: 100vh;
      padding-top: 84px;
      background-color: #ffffff;
    }

    .sidebar {
      position: fixed;
      top: 84px;
      left: 50%;
      transform: translateX(-640px);
      width: 160px;
      height: calc(100vh - 84px);
      background-color: #ffffff;
      padding: 24px 0 24px 20px;
    }

    .sidebar-menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sidebar-menu li a {
      font-size: 12px;
      color: #4e5968;
      line-height: 1.4;
      display: inline-block;
    }

    .sidebar-menu li a:hover {
      color: #191f28;
      font-weight: 600;
    }

    .sidebar-menu li.active a {
      color: #191f28;
      font-weight: 700;
    }

    .main {
      grid-column: 2 / 3;
      width: 100%;
      padding: 32px 24px 48px 24px;
      background-color: #ffffff;
    }

    .news-panel {
      width: 100%;
      min-height: 720px;
      border: 1px solid #e5e8eb;
      background-color: #ffffff;
      padding: 22px 28px 28px 28px;
    }

    .panel-title {
      font-size: 34px;
      font-weight: 700;
      line-height: 1.2;
      color: #191f28;
      margin-bottom: 6px;
      letter-spacing: -0.03em;
    }

    .panel-subtitle {
      font-size: 12px;
      color: #8b95a1;
      margin-bottom: 28px;
      letter-spacing: 0.12em;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 26px 24px;
    }

    .news-card {
      display: block;
      width: 100%;
    }

    .news-image-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      position: relative;
      background-color: #f2f4f6;
      margin-bottom: 10px;
    }

    .news-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .news-link-icon {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 14px;
      height: 14px;
      border: 1px solid rgba(25, 31, 40, 0.45);
      background-color: rgba(255, 255, 255, 0.75);
      border-radius: 2px;
    }

    .news-link-icon::after {
      content: "↗";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-52%, -58%);
      font-size: 9px;
      color: #191f28;
      line-height: 1;
    }

    .news-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
      color: #333d4b;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: keep-all;
    }

    .news-meta {
      font-size: 11px;
      color: #8b95a1;
      line-height: 1.4;
    }

    @media (max-width: 1280px) {
      body {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header class="header">
      <div class="header-logo">
        <a href="/">
          <img src="/static/logo.png" alt="토스증권 로고" />
        </a>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <ul class="sidebar-menu">
          <li><a href="/">홈</a></li>
          <li><a href="/investors">투자 주체별 매매 현황</a></li>
          <li class="active"><a href="/news">뉴스</a></li>
          <li><a href="/themes">종목 TOP 10</a></li>
          <li><a href="/mbti">투자 mbti 검사</a></li>
          <li><a href="/recommend">맞춤 상품 추천</a></li>
          <li><a href="/popular">인기 상품</a></li>
        </ul>
      </aside>

      <main class="main">
        <section class="news-panel">
          <h1 class="panel-title">뉴스</h1>
          <p class="panel-subtitle">시장 흐름에 영향을 주는 주요 경제·금융 뉴스를 빠르게 확인하세요.</p>

          <section id="newsGrid" class="news-grid"></section>
        </section>
      </main>
    </div>
  </div>

  <script src="/static/news.js"></script>
  <script>
    const newsGrid = document.getElementById("newsGrid");

    const fallbackImages = [
      "/static/newsImg1.png",
      "/static/newsImg2.png",
      "/static/newsImg3.png",
      "/static/newsImg4.png",
      "/static/newsImg5.png",
      "/static/newsImg6.png"
    ];

    function getNewsArray() {
      if (window.NEWS_DATA && Array.isArray(window.NEWS_DATA.news)) {
        return window.NEWS_DATA.news;
      }

      if (window.NEWS_DATA && Array.isArray(window.NEWS_DATA.items)) {
        return window.NEWS_DATA.items;
      }

      if (window.newsData && Array.isArray(window.newsData)) {
        return window.newsData;
      }

      if (window.NEWS && Array.isArray(window.NEWS)) {
        return window.NEWS;
      }

      return [
        {
          title: "3월 11일 (수) 뉴스를 다시보기",
          source: "오대석",
          time: "아카이브",
          image: "/static/newsImg1.png"
        },
        {
          title: "한 방에 봐도 혼란 부동산…미·중 화제 협상전 기대감 전략",
          source: "경제 브리핑",
          time: "02:04",
          image: "/static/newsImg2.png"
        },
        {
          title: "한 방에 봐도 혼란 부동산…미·중 화제 협상전 기대감 전략",
          source: "시장 뉴스",
          time: "02:04",
          image: "/static/newsImg3.png"
        },
        {
          title: "결제 미국 내 물가 치킨값…트럼프의 ‘빅베팅’ 효과",
          source: "파이낸셜 포커스",
          time: "화요일",
          image: "/static/newsImg4.png"
        },
        {
          title: "결제 미국 내 물가 치킨값…트럼프의 ‘빅베팅’ 효과",
          source: "정치·경제",
          time: "화요일",
          image: "/static/newsImg5.png"
        },
        {
          title: "결제 미국 내 물가 치킨값…트럼프의 ‘빅베팅’ 효과",
          source: "투자 리포트",
          time: "화요일",
          image: "/static/newsImg6.png"
        }
      ];
    }

    function normalizeNewsItem(item, index) {
      return {
        title: item.title || item.newsTitle || item.headline || "제목 없음",
        source: item.source || item.author || item.publisher || "출처 미상",
        time: item.time || item.date || item.publishedAt || "",
        image: item.image || item.imageUrl || item.thumbnail || fallbackImages[index % fallbackImages.length],
        url: item.url || item.link || "#"
      };
    }

    function renderNews() {
      const rawNews = getNewsArray();
      const newsList = rawNews.slice(0, 6).map(normalizeNewsItem);

      newsGrid.innerHTML = "";

      newsList.forEach(function (news) {
        const card = document.createElement("a");
        card.className = "news-card";
        card.href = news.url || "#";

        card.innerHTML = `
          <div class="news-image-wrap">
            <img src="${news.image}" alt="${news.title}">
            <span class="news-link-icon"></span>
          </div>
          <h2 class="news-title">${news.title}</h2>
          <p class="news-meta">${news.source}<br>${news.time}</p>
        `;

        newsGrid.appendChild(card);
      });
    }

    renderNews();
  </script>
</body>
</html>
