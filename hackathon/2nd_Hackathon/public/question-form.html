<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevQ - 질문 작성</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 헤더 -->
  <header class="bg-white shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/index.html" class="text-2xl font-bold text-indigo-600">DevQ</a>
      <button onclick="history.back()" class="text-sm text-gray-500 hover:text-gray-700">← 뒤로</button>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <h1 id="page-title" class="text-xl font-semibold text-gray-800 mb-6">질문 작성</h1>

    <form id="question-form" class="bg-white rounded-xl shadow-sm p-6 space-y-5 border border-gray-100">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">제목</label>
        <input type="text" id="title" required placeholder="질문 제목을 입력하세요"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">본문</label>
        <textarea id="body" required rows="10" placeholder="문제 상황, 시도한 방법, 오류 메시지 등을 자세히 적어주세요."
                  class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">태그</label>
        <input type="text" id="tag" placeholder="javascript, node, css (쉼표로 구분)"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <p class="text-xs text-gray-400 mt-1">관련 기술 태그를 쉼표로 구분하여 입력하세요.</p>
      </div>

      <p id="error-msg" class="text-red-500 text-sm hidden"></p>

      <div class="flex justify-end gap-3">
        <button type="button" onclick="history.back()"
                class="px-4 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
          취소
        </button>
        <button type="submit"
                class="px-5 py-2 text-sm bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition">
          등록하기
        </button>
      </div>
    </form>
  </main>

  <script src="/js/auth.js"></script>
  <script>
    redirectIfNoAuth();

    const params     = new URLSearchParams(location.search);
    const questionId = params.get('id');
    const isEdit     = !!questionId;

    if (isEdit) {
      document.getElementById('page-title').textContent = '질문 수정';
      document.querySelector('button[type="submit"]').textContent = '수정하기';

      // 기존 데이터 불러오기
      fetch(`/api/questions/${questionId}`)
        .then(r => r.json())
        .then(data => {
          const q = data.question;
          document.getElementById('title').value = q.title;
          document.getElementById('body').value  = q.body;
          document.getElementById('tag').value   = q.tag || '';
        })
        .catch(() => {
          alert('질문 정보를 불러오지 못했습니다.');
          location.href = '/index.html';
        });
    }

    document.getElementById('question-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('error-msg');
      errorMsg.classList.add('hidden');

      const title = document.getElementById('title').value.trim();
      const body  = document.getElementById('body').value.trim();
      const tag   = document.getElementById('tag').value.trim();

      const url    = isEdit ? `/api/questions/${questionId}` : '/api/questions';
      const method = isEdit ? 'PUT' : 'POST';

      try {
        const res  = await fetch(url, {
          method,
          headers: authHeader(),
          body: JSON.stringify({ title, body, tag }),
        });
        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.message;
          errorMsg.classList.remove('hidden');
          return;
        }

        const targetId = isEdit ? questionId : data.id;
        location.href = `/question-detail.html?id=${targetId}`;
      } catch {
        errorMsg.textContent = '서버 연결에 실패했습니다.';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
