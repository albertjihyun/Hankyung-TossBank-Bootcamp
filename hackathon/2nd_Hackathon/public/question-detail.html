<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevQ - 질문 상세</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 헤더 -->
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/index.html" class="text-2xl font-bold text-indigo-600">DevQ</a>
      <nav id="nav-area" class="flex items-center gap-3 text-sm"></nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8 space-y-6">

    <!-- 질문 영역 -->
    <section id="question-section" class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
      <p class="text-gray-400 text-center py-8">불러오는 중...</p>
    </section>

    <!-- 답변 목록 -->
    <section>
      <h2 id="answer-count" class="text-base font-semibold text-gray-700 mb-3">답변</h2>
      <div id="answer-list" class="space-y-4"></div>
    </section>

    <!-- 답변 작성 폼 -->
    <section id="answer-form-section"></section>

  </main>

  <script src="/js/auth.js"></script>
  <script>
    const params     = new URLSearchParams(location.search);
    const questionId = params.get('id');

    if (!questionId) location.href = '/index.html';

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function nl2br(str) {
      return escapeHtml(str).replace(/\n/g, '<br>');
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('ko-KR', {
        year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    function renderTags(tagStr) {
      if (!tagStr) return '';
      return tagStr.split(',')
        .map(t => t.trim()).filter(Boolean)
        .map(t => `<span class="bg-indigo-50 text-indigo-600 text-xs px-2 py-0.5 rounded-full">${escapeHtml(t)}</span>`)
        .join('');
    }

    // 헤더 렌더링
    function renderNav() {
      const nav = document.getElementById('nav-area');
      if (isLoggedIn()) {
        const user = getUser();
        nav.innerHTML = `
          ${isAdmin() ? `<a href="/admin.html" class="text-purple-600 font-medium hover:underline">관리자</a>` : ''}
          <span class="text-gray-600">${user.nickname}님</span>
          <button onclick="logout()" class="text-gray-500 hover:text-red-500">로그아웃</button>
        `;
      } else {
        nav.innerHTML = `
          <a href="/login.html" class="text-indigo-600 hover:underline">로그인</a>
          <a href="/register.html" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700">회원가입</a>
        `;
      }
    }

    // 질문 삭제
    async function deleteQuestion() {
      if (!confirm('질문을 삭제하면 답변도 모두 삭제됩니다. 계속할까요?')) return;
      const res = await fetch(`/api/questions/${questionId}`, {
        method: 'DELETE',
        headers: authHeader(),
      });
      if (res.ok) {
        location.href = '/index.html';
      } else {
        const data = await res.json();
        alert(data.message);
      }
    }

    // 답변 삭제
    async function deleteAnswer(answerId) {
      if (!confirm('답변을 삭제할까요?')) return;
      const res = await fetch(`/api/answers/${answerId}`, {
        method: 'DELETE',
        headers: authHeader(),
      });
      if (res.ok) {
        loadPage();
      } else {
        const data = await res.json();
        alert(data.message);
      }
    }

    // 메인 데이터 로드 및 렌더링
    async function loadPage() {
      const qSection   = document.getElementById('question-section');
      const aList      = document.getElementById('answer-list');
      const aCount     = document.getElementById('answer-count');
      const aFormSec   = document.getElementById('answer-form-section');
      const currentUser = getUser();

      try {
        const res  = await fetch(`/api/questions/${questionId}`);
        if (!res.ok) {
          qSection.innerHTML = '<p class="text-red-400 text-center py-8">질문을 찾을 수 없습니다.</p>';
          return;
        }
        const { question: q, answers } = await res.json();

        // 본인 또는 admin 여부
        const canEditQ = isLoggedIn() && (currentUser.id === q.user_id || isAdmin());

        // 질문 렌더링
        qSection.innerHTML = `
          <div class="flex items-start justify-between gap-4 mb-3">
            <h1 class="text-lg font-bold text-gray-900 flex-1">${escapeHtml(q.title)}</h1>
            ${canEditQ ? `
              <div class="flex gap-2 shrink-0">
                <a href="/question-form.html?id=${q.id}"
                   class="text-xs text-indigo-600 border border-indigo-300 px-2.5 py-1 rounded-lg hover:bg-indigo-50 transition">수정</a>
                <button onclick="deleteQuestion()"
                        class="text-xs text-red-500 border border-red-300 px-2.5 py-1 rounded-lg hover:bg-red-50 transition">삭제</button>
              </div>
            ` : ''}
          </div>
          <div class="flex items-center gap-2 text-xs text-gray-500 mb-4">
            <span class="font-medium text-gray-700">${escapeHtml(q.nickname)}</span>
            <span>${formatDate(q.created_at)}</span>
            ${renderTags(q.tag)}
          </div>
          <div class="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap border-t border-gray-100 pt-4">${nl2br(q.body)}</div>
        `;

        // 답변 목록 렌더링
        aCount.textContent = `답변 ${answers.length}개`;
        if (answers.length === 0) {
          aList.innerHTML = '<p class="text-gray-400 text-sm text-center py-6">아직 답변이 없습니다.</p>';
        } else {
          aList.innerHTML = answers.map(a => {
            const canDeleteA = isLoggedIn() && (currentUser.id === a.user_id || isAdmin());
            return `
              <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                <div class="flex items-center justify-between mb-3">
                  <div class="flex items-center gap-2 text-xs text-gray-500">
                    <span class="font-medium text-gray-700">${escapeHtml(a.nickname)}</span>
                    <span>${formatDate(a.created_at)}</span>
                  </div>
                  ${canDeleteA ? `
                    <button onclick="deleteAnswer(${a.id})"
                            class="text-xs text-red-400 hover:text-red-600 border border-red-200 px-2 py-0.5 rounded-lg hover:bg-red-50 transition">삭제</button>
                  ` : ''}
                </div>
                <div class="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap">${nl2br(a.body)}</div>
              </div>
            `;
          }).join('');
        }

        // 답변 작성 폼
        if (isLoggedIn()) {
          aFormSec.innerHTML = `
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
              <h3 class="text-sm font-semibold text-gray-700 mb-3">답변 작성</h3>
              <form id="answer-form">
                <textarea id="answer-body" rows="5" required placeholder="도움이 될 답변을 남겨주세요."
                          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none mb-3"></textarea>
                <p id="answer-error" class="text-red-500 text-sm hidden mb-2"></p>
                <div class="flex justify-end">
                  <button type="submit"
                          class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
                    답변 등록
                  </button>
                </div>
              </form>
            </div>
          `;

          document.getElementById('answer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = document.getElementById('answer-body').value.trim();
            const errEl = document.getElementById('answer-error');
            errEl.classList.add('hidden');

            const res = await fetch(`/api/questions/${questionId}/answers`, {
              method: 'POST',
              headers: authHeader(),
              body: JSON.stringify({ body }),
            });
            const data = await res.json();

            if (!res.ok) {
              errEl.textContent = data.message;
              errEl.classList.remove('hidden');
              return;
            }
            loadPage();
          });
        } else {
          aFormSec.innerHTML = `
            <p class="text-center text-sm text-gray-500 py-4">
              <a href="/login.html" class="text-indigo-600 hover:underline font-medium">로그인</a> 후 답변을 남길 수 있습니다.
            </p>
          `;
        }

      } catch {
        qSection.innerHTML = '<p class="text-red-400 text-center py-8">데이터를 불러오지 못했습니다.</p>';
      }
    }

    renderNav();
    loadPage();
  </script>
</body>
</html>
