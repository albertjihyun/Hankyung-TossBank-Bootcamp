<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevQ - 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-md w-full max-w-md p-8">
    <h1 class="text-2xl font-bold text-indigo-600 text-center mb-1">DevQ</h1>
    <p class="text-gray-500 text-center text-sm mb-8">개발자 Q&A 커뮤니티</p>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
        <input type="email" id="email" required placeholder="you@example.com"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
        <input type="password" id="password" required placeholder="••••••••"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>

      <p id="error-msg" class="text-red-500 text-sm hidden"></p>

      <button type="submit"
              class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 transition">
        로그인
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      계정이 없으신가요?
      <a href="/register.html" class="text-indigo-600 hover:underline font-medium">회원가입</a>
    </p>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    // 이미 로그인 상태면 메인으로
    if (isLoggedIn()) location.href = '/index.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('error-msg');
      errorMsg.classList.add('hidden');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res  = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.message;
          errorMsg.classList.remove('hidden');
          return;
        }

        localStorage.setItem('token', data.token);
        location.href = '/index.html';
      } catch {
        errorMsg.textContent = '서버 연결에 실패했습니다.';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
