<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevQ - 회원가입</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-md w-full max-w-md p-8">
    <h1 class="text-2xl font-bold text-indigo-600 text-center mb-1">DevQ</h1>
    <p class="text-gray-500 text-center text-sm mb-8">회원가입</p>

    <form id="register-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
        <input type="email" id="email" required placeholder="you@example.com"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
        <input type="password" id="password" required placeholder="••••••••"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">닉네임</label>
        <input type="text" id="nickname" required placeholder="표시될 이름"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>

      <!-- 역할 선택 (해커톤용 간소화) -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">역할</label>
        <div class="flex gap-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="role" value="user" checked class="accent-indigo-600" />
            <span class="text-sm text-gray-700">일반 사용자</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="role" value="admin" class="accent-indigo-600" />
            <span class="text-sm text-gray-700">관리자</span>
          </label>
        </div>
      </div>

      <p id="error-msg" class="text-red-500 text-sm hidden"></p>

      <button type="submit"
              class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-medium hover:bg-indigo-700 transition">
        가입하기
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      이미 계정이 있으신가요?
      <a href="/login.html" class="text-indigo-600 hover:underline font-medium">로그인</a>
    </p>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    if (isLoggedIn()) location.href = '/index.html';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('error-msg');
      errorMsg.classList.add('hidden');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const nickname = document.getElementById('nickname').value.trim();
      const role     = document.querySelector('input[name="role"]:checked').value;

      try {
        const res  = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, nickname, role }),
        });
        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.message;
          errorMsg.classList.remove('hidden');
          return;
        }

        location.href = '/login.html';
      } catch {
        errorMsg.textContent = '서버 연결에 실패했습니다.';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
